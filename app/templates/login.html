<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Uganda Tours</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .auth-card {
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card auth-card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0 text-center">Welcome Back</h4>
                    </div>
                    <div class="card-body">
                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}
                        {% if success %}
                        <div class="alert alert-success">{{ success }}</div>
                        {% endif %}

                        <div class="mb-4 text-center">
                              <div id="g_id_onload"
                                   data-client_id="{{ google_client_id }}"
                                   data-context="signin"
                                   data-ux_mode="popup"
                                   data-callback="handleGoogleSignIn"
                                   data-auto_prompt="false">
                              </div>
                            
                              <div class="g_id_signin"
                                   data-type="standard"
                                   data-shape="rectangular"
                                   data-theme="outline"
                                   data-text="signin_with"
                                   data-size="large"
                                   data-logo_alignment="left">
                              </div>
                            
                              <div class="divider d-flex align-items-center my-4">
                                <p class="text-center fw-bold mx-3 mb-0 text-muted">OR</p>
                              </div>
                            </div>
                        
                        <form method="post" action="/login">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Login</button>
                            </div>
                        </form>
                        <div class="text-center mt-6">
                           <a href="/forgot-password" class="text-blue-600 hover:underline">Forgot Password?</a>
                        </div>
                        <div class="mt-3 text-center">
                            Don't have an account? 
                            <a href="/signup" class="text-decoration-none">Sign up here</a>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      function handleGoogleSignIn(response) {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/auth/google';
        
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'token';
        input.value = response.credential;
        
        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
